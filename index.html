<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOLChat • Golden Knights</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a14;
            --surface: #12122a;
            --surface2: #1a1a35;
            --gold: #d4af37;
            --gold-dark: #b8960c;
            --blue: #1e3a6b;
            --blue-light: #2a5298;
            --green: #4cff8d;
            --red: #e94560;
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(145deg, #06060f 0%, #0a0a1a 30%, #0f0f25 60%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.06) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(30, 58, 107, 0.08) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .app {
            width: 100%;
            max-width: 440px;
            height: 780px;
            max-height: 95vh;
            background: rgba(15, 15, 30, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 36px;
            box-shadow: var(--shadow), 0 0 0 1px var(--border), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* ========== ЭКРАН ВХОДА ========== */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px 28px;
            text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            position: relative;
            margin-bottom: 16px;
        }

        .logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1a1a35 0%, #252550 100%);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, transparent 50%);
            border-radius: 26px;
        }

        .logo-text {
            font-size: 38px;
            font-weight: 900;
            letter-spacing: -2px;
            position: relative;
            z-index: 1;
        }

        .logo-text .lol {
            background: linear-gradient(135deg, #e94560, #ff6b8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text .chat {
            background: linear-gradient(135deg, #d4af37, #f0d060);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-title {
            font-size: 30px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .app-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .beta-tag {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid rgba(233, 69, 96, 0.4);
            color: #e94560;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .group-badge {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.25);
            padding: 10px 20px;
            border-radius: 30px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold);
            font-size: 13px;
            font-weight: 600;
        }

        .group-badge .shield {
            font-size: 20px;
        }

        .online-indicator-login {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--green);
            font-size: 12px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px var(--green);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.8);
            }
        }

        .input-group {
            width: 100%;
            margin-bottom: 16px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-field {
            width: 100%;
            padding: 15px 18px;
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 18px;
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }

        .input-field:focus {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
            background: rgba(25, 25, 50, 0.8);
        }

        .secret-wrapper {
            position: relative;
            width: 100%;
        }

        .secret-wrapper .input-field {
            padding-right: 50px;
        }

        .toggle-visibility {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 20px;
            padding: 5px;
            transition: 0.2s;
        }

        .toggle-visibility:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold-dark), #8b7100);
            border: none;
            border-radius: 18px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4);
        }

        .btn-primary:active {
            transform: translateY(1px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .error-message {
            color: var(--red);
            font-size: 13px;
            min-height: 20px;
            margin-top: 8px;
            font-weight: 500;
            text-align: center;
        }

        .hint-text {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 16px;
            text-align: center;
        }

        /* ========== ЭКРАН ЧАТА ========== */
        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .chat-header {
            padding: 16px 20px;
            background: rgba(10, 10, 24, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 36px 36px 0 0;
            flex-shrink: 0;
        }

        .chat-avatar {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
            flex-shrink: 0;
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-info h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-info .online-info {
            font-size: 11px;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .chat-header-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message-wrapper {
            display: flex;
            gap: 8px;
            animation: messageIn 0.3s ease;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-wrapper.sent {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: white;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
        }

        .message-wrapper.received .message-bubble {
            background: rgba(30, 30, 55, 0.7);
            color: #e0e0f0;
            border-bottom-left-radius: 6px;
        }

        .message-wrapper.sent .message-bubble {
            background: linear-gradient(135deg, var(--blue), #15305a);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message-system {
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            padding: 4px 0;
            font-style: italic;
        }

        .message-sender {
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 3px;
            opacity: 0.8;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.5;
            text-align: right;
            margin-top: 4px;
        }

        .typing-indicator {
            font-size: 11px;
            color: var(--gold);
            padding: 4px 16px;
            font-style: italic;
            min-height: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .chat-input-area {
            padding: 12px 16px;
            background: rgba(10, 10, 24, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            border-radius: 0 0 36px 36px;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 13px 18px;
            background: rgba(25, 25, 50, 0.6);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .chat-input:focus {
            border-color: rgba(212, 175, 55, 0.4);
            background: rgba(30, 30, 60, 0.7);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--gold-dark), #7a6000);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .send-btn:active {
            transform: scale(0.9);
            background: var(--gold);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ЭКРАН ВХОДА -->
        <div class="login-screen" id="loginScreen">
            <div class="logo-container">
                <div class="logo">
                    <span class="logo-text">
                        <span class="lol">LOL</span><span class="chat">Chat</span>
                    </span>
                </div>
            </div>
            <div class="app-subtitle">
                Бета-версия <span class="beta-tag">BETA</span>
            </div>

            <div class="group-badge">
                <span class="shield">🛡️</span> Golden Knights
            </div>

            <div class="online-indicator-login">
                <span class="pulse-dot"></span> Кенты онлайн
            </div>

            <div class="input-group">
                <label class="input-label">Твой ник</label>
                <input type="text" class="input-field" id="nicknameInput" placeholder="Введи ник..." autocomplete="off" maxlength="20">
            </div>

            <div class="input-group">
                <label class="input-label">Секретный ключ</label>
                <div class="secret-wrapper">
                    <input type="password" class="input-field" id="groupCodeInput" placeholder="•••••••" autocomplete="off">
                    <button class="toggle-visibility" id="toggleCodeBtn">👁️</button>
                </div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button class="btn-primary" id="loginBtn">🚀 Войти в LOLChat</button>
            <div class="hint-text">Только для своих • Ключ знают только кенты</div>
        </div>

        <!-- ЭКРАН ЧАТА -->
        <div class="chat-screen hidden" id="chatScreen">
            <div class="chat-header">
                <div class="chat-avatar">🛡️</div>
                <div class="chat-header-info">
                    <h3>Golden Knights</h3>
                    <div class="online-info">
                        <span class="pulse-dot"></span>
                        <span id="onlineCount">0 кентов в сети</span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <button class="btn-icon" id="membersBtn" title="Кто в чате">👥</button>
                    <button class="btn-icon" id="logoutBtn" title="Выйти">🚪</button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <!-- Сообщения здесь -->
            </div>

            <div class="typing-indicator" id="typingIndicator"></div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" id="messageInput" placeholder="Напиши чё-нить смешное..." autocomplete="off" maxlength="500">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onValue, set, serverTimestamp, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // ========== ТВОЙ РЕАЛЬНЫЙ FIREBASE КОНФИГ ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCEMMqfHmdpp-zLa65iJNrJifQqPN12YVM",
            authDomain: "lolchat-a2dec.firebaseapp.com",
            projectId: "lolchat-a2dec",
            storageBucket: "lolchat-a2dec.firebasestorage.app",
            messagingSenderId: "248199804337",
            appId: "1:248199804337:web:e73ab2004fc97764c63990",
            measurementId: "G-T8BS663ENC"
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ========== КОНСТАНТЫ ==========
        const SECRET_CODE = '9410565';
        const GROUP_NAME = 'Golden Knights';

        // ========== DOM ЭЛЕМЕНТЫ ==========
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const nicknameInput = document.getElementById('nicknameInput');
        const groupCodeInput = document.getElementById('groupCodeInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const toggleCodeBtn = document.getElementById('toggleCodeBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const onlineCount = document.getElementById('onlineCount');
        const typingIndicator = document.getElementById('typingIndicator');
        const logoutBtn = document.getElementById('logoutBtn');
        const membersBtn = document.getElementById('membersBtn');

        // ========== СОСТОЯНИЕ ==========
        let currentUser = null;
        let currentUserRef = null;
        let typingTimeout = null;

        // ========== ФУНКЦИИ ==========
        function getAvatarFromNick(nick) {
            if (!nick || nick.trim() === '') return '??';
            const parts = nick.trim().split(/[\s_]+/);
            if (parts.length >= 2) {
                return (parts[0][0] + parts[1][0]).toUpperCase();
            }
            return nick.trim().substring(0, 2).toUpperCase();
        }

        function getRandomColor(nick) {
            const colors = ['#e94560', '#d4af37', '#4a9eff', '#4cff8d', '#ff6bca', '#ff9f43', '#a55eea', '#2ed573'];
            let hash = 0;
            for (let i = 0; i < nick.length; i++) {
                hash = nick.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function getTimeString() {
            const now = new Date();
            return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Добавление сообщения в DOM
        function addMessageToDOM(msg, isSent) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.style.background = msg.color || getRandomColor(msg.sender);
            avatar.textContent = msg.avatar || getAvatarFromNick(msg.sender);
            avatar.title = msg.sender;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (!isSent) {
                const senderLabel = document.createElement('div');
                senderLabel.className = 'message-sender';
                senderLabel.textContent = msg.sender;
                senderLabel.style.color = msg.color || getRandomColor(msg.sender);
                bubble.appendChild(senderLabel);
            }

            const text = document.createElement('div');
            text.textContent = msg.text;

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = msg.time || getTimeString();

            bubble.appendChild(text);
            bubble.appendChild(time);

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);

            messagesContainer.appendChild(wrapper);
        }

        // Системное сообщение
        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message-system';
            div.textContent = text;
            messagesContainer.appendChild(div);
            scrollToBottom();
        }

        // ========== ПОДКЛЮЧЕНИЕ К ЧАТУ ==========
        function joinChat() {
            const nick = nicknameInput.value.trim();
            const code = groupCodeInput.value.trim();

            if (!nick) {
                errorMessage.textContent = '⚠️ Введи ник, бро';
                return;
            }
            if (nick.length < 2) {
                errorMessage.textContent = '⚠️ Ник должен быть от 2 символов';
                return;
            }
            if (code !== SECRET_CODE) {
                errorMessage.textContent = '❌ Неверный ключ! Ты точно кент?';
                groupCodeInput.value = '';
                return;
            }

            currentUser = nick;
            errorMessage.textContent = '';

            // Переключаем экраны
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');

            // Регистрируем пользователя в Firebase
            const usersRef = ref(db, 'users');
            currentUserRef = push(usersRef);
            const userData = {
                nick: currentUser,
                avatar: getAvatarFromNick(currentUser),
                color: getRandomColor(currentUser),
                online: true,
                timestamp: serverTimestamp()
            };
            set(currentUserRef, userData);
            onDisconnect(currentUserRef).remove();

            // Системное сообщение о входе
            const messagesRef = ref(db, 'messages');
            push(messagesRef, {
                type: 'system',
                text: `${currentUser} зашёл в чат 👋`,
                sender: 'LOLChat',
                time: getTimeString(),
                timestamp: serverTimestamp()
            });

            // Слушаем новые сообщения
            onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                if (msg.type === 'system') {
                    addSystemMessage(msg.text);
                } else {
                    const isSent = msg.sender === currentUser;
                    addMessageToDOM(msg, isSent);
                }
                scrollToBottom();
            });

            // Слушаем пользователей онлайн
            onValue(usersRef, (snapshot) => {
                const users = snapshot.val();
                const onlineUsers = users ? Object.values(users).filter(u => u.online) : [];
                const count = onlineUsers.length;
                onlineCount.textContent = `${count} кент${count === 1 ? '' : count < 5 ? 'а' : 'ов'} в сети`;
            });

            // Слушаем индикатор печати
            const typingRef = ref(db, 'typing');
            onValue(typingRef, (snapshot) => {
                const typingData = snapshot.val();
                if (typingData && typingData.nick !== currentUser && typingData.active) {
                    typingIndicator.textContent = `${typingData.nick} печатает...`;
                } else {
                    typingIndicator.textContent = '';
                }
            });

            messageInput.focus();
        }

        // Отправка сообщения
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser) return;

            const messagesRef = ref(db, 'messages');
            push(messagesRef, {
                type: 'message',
                sender: currentUser,
                avatar: getAvatarFromNick(currentUser),
                color: getRandomColor(currentUser),
                text: text,
                time: getTimeString(),
                timestamp: serverTimestamp()
            });

            messageInput.value = '';
            messageInput.focus();

            // Сбрасываем индикатор печати
            const typingRef = ref(db, 'typing');
            set(typingRef, { nick: currentUser, active: false });
        }

        // Индикатор печати
        function handleTyping() {
            if (!currentUser) return;

            const typingRef = ref(db, 'typing');
            set(typingRef, { nick: currentUser, active: true });

            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                set(typingRef, { nick: currentUser, active: false });
            }, 2000);
        }

        // Выход из чата
        function logout() {
            if (currentUserRef) {
                const messagesRef = ref(db, 'messages');
                push(messagesRef, {
                    type: 'system',
                    text: `${currentUser} вышел из чата 👋`,
                    sender: 'LOLChat',
                    time: getTimeString(),
                    timestamp: serverTimestamp()
                });
                remove(currentUserRef);
            }

            currentUser = null;
            currentUserRef = null;
            messagesContainer.innerHTML = '';
            chatScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            groupCodeInput.value = '';
            nicknameInput.value = '';
            nicknameInput.focus();
        }

        // Показать участников
        function showMembers() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const users = snapshot.val();
                const onlineUsers = users ? Object.values(users).filter(u => u.online) : [];
                const names = onlineUsers.map(u => u.nick).join(', ');
                alert(`Кенты в чате (${onlineUsers.length}):\n${names || 'Пока никого нет'}`);
            }, { onlyOnce: true });
        }

        // ========== ОБРАБОТЧИКИ ==========
        loginBtn.addEventListener('click', joinChat);
        sendBtn.addEventListener('click', sendMessage);
        logoutBtn.addEventListener('click', logout);
        membersBtn.addEventListener('click', showMembers);

        toggleCodeBtn.addEventListener('click', () => {
            if (groupCodeInput.type === 'password') {
                groupCodeInput.type = 'text';
                toggleCodeBtn.textContent = '🙈';
            } else {
                groupCodeInput.type = 'password';
                toggleCodeBtn.textContent = '👁️';
            }
        });

        nicknameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                groupCodeInput.focus();
            }
        });

        groupCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinChat();
            }
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        messageInput.addEventListener('input', handleTyping);

        // Фокус при загрузке
        nicknameInput.focus();

        console.log('🛡️ LOLChat загружен • Golden Knights');
        console.log('⚡ Твой Firebase подключён! Зови кентов!');
    </script>
</body>
</html>
